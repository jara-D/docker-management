name: Build and Push Images

on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug actor
        run: echo "Actor is ${{ github.actor }}"


      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT }}

      - name: Build Laravel image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/jara-d/sili-laravel:${{ github.sha }}
            ghcr.io/jara-d/sili-laravel:${{ github.ref_name }}
            ${{ github.ref_name == 'main' && 'ghcr.io/jara-d/sili-laravel:latest' }}

      - name: Build Go service image
        uses: docker/build-push-action@v5
        with:
          context: ./go-docker-service
          file: ./go-docker-service/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/jara-d/sili-go:${{ github.sha }}
            ghcr.io/jara-d/sili-go:${{ github.ref_name }}
            ${{ github.ref_name == 'main' && 'ghcr.io/jara-d/sili-go:latest' }}
