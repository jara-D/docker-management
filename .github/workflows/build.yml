name: Build and Push Images

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Laravel image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-laravel:latest

      - name: Build Go service image
        uses: docker/build-push-action@v5
        with:
          context: ./go-docker-service
          file: ./go-docker-service/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}--go:latest
