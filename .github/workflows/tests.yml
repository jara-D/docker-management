name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2
          coverage: xdebug

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Configure DB for CI
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Start Sail
        run: ./vendor/bin/sail up -d --build

      - name: Fix permissions
        run: chmod -R 777 storage bootstrap/cache && chmod 777 .env

      - name: Generate Application Key
        run: ./vendor/bin/sail artisan key:generate

      - name: Run Migrations
        run: ./vendor/bin/sail artisan migrate

      - name: Build assets
        run: ./vendor/bin/sail npm run build

      - name: Ensure Vite manifest exists
        run: ./vendor/bin/sail ls -la public/build

      - name: Tests
        run: ./vendor/bin/sail pest

      - name: Stop Sail
        if: always()
        run: ./vendor/bin/sail down -v
